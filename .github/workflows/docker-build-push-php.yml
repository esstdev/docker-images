name: esst/php

on:
  release:
    types:
      - created
  schedule:
    - cron: '0 1 * * 1'

jobs:
  build-and-test:
    strategy:
      matrix:
        php_version: [8.3, 8.4]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      ## Test Build
      - name: Test Build [PHP ${{ matrix.php_version }}]
        if: contains(github.ref, 'php-${{ matrix.php_version }}-fpm-alpine@') || github.event_name == 'schedule'
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          load: true
          file: ./php/${{ matrix.php_version }}/fpm-alpine/Dockerfile
          tags: esst/php:${{ matrix.php_version }}-fpm-alpine-test-${{ matrix.arch }}

      ## Run container for testing
      - name: Run container for testing [PHP ${{ matrix.php_version }}]
        if: contains(github.ref, 'php-${{ matrix.php_version }}-fpm-alpine@') || github.event_name == 'schedule'
        run: |
          docker run -d --name php_container${{ matrix.php_version }} esst/php:${{ matrix.php_version }}-fpm-alpine-test-${{ matrix.arch }}

      - name: Check PHP extensions [PHP ${{ matrix.php_version }}]
        if: contains(github.ref, 'php-${{ matrix.php_version }}-fpm-alpine@') || github.event_name == 'schedule'
        run: |
          extensions=("bcmath" "exif" "gd" "intl" "ldap" "pcntl" "pdo_mysql" "xml" "mbstring" "curl" "zip" "memcached" "imagick" "redis")
          for ext in "${extensions[@]}"; do
            if ! docker exec php_container${{ matrix.php_version }} bash -c "php -m | grep -wq '$ext'"; then
              echo "$ext extension is NOT installed"
              exit 1
            fi
          done
          echo "✅ All extensions are installed"

      ## Build & Push Final Image
      - name: Build & Push [PHP ${{ matrix.php_version }}]
        if: success()
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          push: true
          file: ./php/${{ matrix.php_version }}/fpm-alpine/Dockerfile
          tags: esst/php:${{ matrix.php_version }}-fpm-alpine-${{ matrix.arch }}

  merge-manifest:
    needs: build-and-test
    strategy:
      matrix:
        php_version: [8.3, 8.4]

    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Inspect pushed images
        run: |
          docker manifest inspect esst/php:${{ matrix.php_version }}-fpm-alpine-amd64 || echo "No amd64 image found"
          docker manifest inspect esst/php:${{ matrix.php_version }}-fpm-alpine-arm64 || echo "No arm64 image found"

      - name: Create and Push Multi-Arch Manifest [PHP ${{ matrix.php_version }}]
        run: |
          docker manifest create esst/php:${{ matrix.php_version }}-fpm-alpine \
            --amend esst/php:${{ matrix.php_version }}-fpm-alpine-amd64 \
            --amend esst/php:${{ matrix.php_version }}-fpm-alpine-arm64
          
          docker manifest push esst/php:${{ matrix.php_version }}-fpm-alpine