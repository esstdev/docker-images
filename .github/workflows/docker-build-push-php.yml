name: esst/php

on:
  release:
    types:
      - created
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:
    inputs:
      php_version:
        description: "PHP Version (e.g., 8.3, 8.4)"
        required: true
      variant:
        description: "Variant (fpm-alpine, fpm-nginx-alpine)"
        required: true

jobs:
  build-and-test:
    strategy:
      matrix:
        php_version: [8.3, 8.4]
        variant: [fpm-alpine, fpm-nginx-alpine]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    runs-on: ${{ matrix.runner }}

    env:
      PHP_VERSION: ${{ matrix.php_version }}
      VARIANT: ${{ matrix.variant }}
      ARCH: ${{ matrix.arch }}

    if: |
      (github.event_name == 'release' && startsWith(github.ref, format('refs/tags/php-{0}-{1}@v2.', env.PHP_VERSION, env.VARIANT))) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.php_version == env.PHP_VERSION && github.event.inputs.variant == env.VARIANT) ||
      (github.event_name == 'schedule')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build Image (Per Architecture) [PHP ${{ env.PHP_VERSION }}-${{ env.VARIANT }}]
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ env.ARCH }}
          load: true  # Load locally for testing
          file: ./php/${{ env.PHP_VERSION }}/${{ env.VARIANT }}/Dockerfile
          tags: esst/php:${{ env.PHP_VERSION }}-${{ env.VARIANT }}-${{ env.ARCH }}

      - name: Run container for testing [PHP ${{ env.PHP_VERSION }}-${{ env.VARIANT }}]
        if: env.ARCH == 'amd64'
        run: |
          docker run -d --name php_container${{ env.PHP_VERSION }} esst/php:${{ env.PHP_VERSION }}-${{ env.VARIANT }}-${{ env.ARCH }}

      - name: Check PHP extensions [PHP ${{ env.PHP_VERSION }}-${{ env.VARIANT }}]
        if: env.ARCH == 'amd64'
        run: |
          extensions=("bcmath" "exif" "gd" "intl" "ldap" "pcntl" "pdo_mysql" "xml" "mbstring" "curl" "zip" "memcached" "imagick" "redis")
          for ext in "${extensions[@]}"; do
            if ! docker exec php_container${{ env.PHP_VERSION }} bash -c "php -m | grep -wq '$ext'"; then
              echo "$ext extension is NOT installed"
              exit 1
            fi
          done
          echo "✅ All extensions are installed"

      - name: Save Image for Merge [PHP ${{ env.PHP_VERSION }}-${{ env.VARIANT }}]
        run: docker save esst/php:${{ env.PHP_VERSION }}-${{ env.VARIANT }}-${{ env.ARCH }} | gzip > php-${{ env.PHP_VERSION }}-${{ env.VARIANT }}-${{ env.ARCH }}.tar.gz

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v3
        with:
          name: php-${{ env.PHP_VERSION }}-${{ env.VARIANT }}-${{ env.ARCH }}
          path: php-${{ env.PHP_VERSION }}-${{ env.VARIANT }}-${{ env.ARCH }}.tar.gz
          retention-days: 1

  merge-manifest:
    needs: build-and-test
    strategy:
      matrix:
        php_version: [8.3, 8.4]
        variant: [fpm-alpine, fpm-nginx-alpine]

    runs-on: ubuntu-latest

    env:
      PHP_VERSION: ${{ matrix.php_version }}
      VARIANT: ${{ matrix.variant }}

    if: |
      (github.event_name == 'release' && startsWith(github.ref, format('refs/tags/php-{0}-{1}@v2.', env.PHP_VERSION, env.VARIANT))) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.php_version == env.PHP_VERSION && github.event.inputs.variant == env.VARIANT) ||
      (github.event_name == 'schedule')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Download amd64 Image
        uses: actions/download-artifact@v3
        with:
          name: php-${{ env.PHP_VERSION }}-${{ env.VARIANT }}-amd64

      - name: Download arm64 Image
        uses: actions/download-artifact@v3
        with:
          name: php-${{ env.PHP_VERSION }}-${{ env.VARIANT }}-arm64

      - name: Load Images
        run: |
          docker load < php-${{ env.PHP_VERSION }}-${{ env.VARIANT }}-amd64.tar.gz
          docker load < php-${{ env.PHP_VERSION }}-${{ env.VARIANT }}-arm64.tar.gz

      - name: Create and Push Multi-Arch Manifest [PHP ${{ env.PHP_VERSION }}-${{ env.VARIANT }}]
        run: |
          docker manifest create esst/php:${{ env.PHP_VERSION }}-${{ env.VARIANT }} \
            --amend esst/php:${{ env.PHP_VERSION }}-${{ env.VARIANT }}-amd64 \
            --amend esst/php:${{ env.PHP_VERSION }}-${{ env.VARIANT }}-arm64

          docker manifest push esst/php:${{ env.PHP_VERSION }}-${{ env.VARIANT }}
