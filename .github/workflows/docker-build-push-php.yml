name: esst/php

on:
  release:
    types:
      - created
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:
    inputs:
      php_version:
        description: "PHP Version (e.g., 8.3, 8.4)"
        required: true
      variant:
        description: "Variant (fpm-alpine, fpm-nginx-alpine)"
        required: true

jobs:
  build-and-test:
    strategy:
      matrix:
        php_version: [8.3, 8.4]
        variant: [fpm-alpine, fpm-nginx-alpine]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    runs-on: ${{ matrix.runner }}

    if: |
      (github.event_name == 'release' && startsWith(github.ref, 'refs/tags/php-${{ matrix.php_version }}-${{ matrix.variant }}@v2.')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.php_version == matrix.php_version && github.event.inputs.variant == matrix.variant) ||
      (github.event_name == 'schedule')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build Image (Per Architecture) [PHP ${{ matrix.php_version }}-${{ matrix.variant }}]
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          load: true
          file: ./php/${{ matrix.php_version }}/${{ matrix.variant }}/Dockerfile
          tags: esst/php:${{ matrix.php_version }}-${{ matrix.variant }}-${{ matrix.arch }}

      - name: Run container for testing [PHP ${{ matrix.php_version }}-${{ matrix.variant }}]
        if: matrix.arch == 'amd64'
        run: |
          docker run -d --name php_container${{ matrix.php_version }} esst/php:${{ matrix.php_version }}-${{ matrix.variant }}-${{ matrix.arch }}

      - name: Check PHP extensions [PHP ${{ matrix.php_version }}-${{ matrix.variant }}]
        if: matrix.arch == 'amd64'
        run: |
          extensions=("bcmath" "exif" "gd" "intl" "ldap" "pcntl" "pdo_mysql" "xml" "mbstring" "curl" "zip" "memcached" "imagick" "redis")
          for ext in "${extensions[@]}"; do
            if ! docker exec php_container${{ matrix.php_version }} bash -c "php -m | grep -wq '$ext'"; then
              echo "$ext extension is NOT installed"
              exit 1
            fi
          done
          echo "✅ All extensions are installed"

      - name: Save Image for Merge [PHP ${{ matrix.php_version }}-${{ matrix.variant }}]
        run: docker save esst/php:${{ matrix.php_version }}-${{ matrix.variant }}-${{ matrix.arch }} | gzip > php-${{ matrix.php_version }}-${{ matrix.variant }}-${{ matrix.arch }}.tar.gz

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v3
        with:
          name: php-${{ matrix.php_version }}-${{ matrix.variant }}-${{ matrix.arch }}
          path: php-${{ matrix.php_version }}-${{ matrix.variant }}-${{ matrix.arch }}.tar.gz
          retention-days: 1

  merge-manifest:
    needs: build-and-test
    strategy:
      matrix:
        php_version: [8.3, 8.4]
        variant: [fpm-alpine, fpm-nginx-alpine]

    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'release' && startsWith(github.ref, 'refs/tags/php-${{ matrix.php_version }}-${{ matrix.variant }}@v2.')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.php_version == matrix.php_version && github.event.inputs.variant == matrix.variant) ||
      (github.event_name == 'schedule')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Download amd64 Image
        uses: actions/download-artifact@v3
        with:
          name: php-${{ matrix.php_version }}-${{ matrix.variant }}-amd64

      - name: Download arm64 Image
        uses: actions/download-artifact@v3
        with:
          name: php-${{ matrix.php_version }}-${{ matrix.variant }}-arm64

      - name: Load Images
        run: |
          docker load < php-${{ matrix.php_version }}-${{ matrix.variant }}-amd64.tar.gz
          docker load < php-${{ matrix.php_version }}-${{ matrix.variant }}-arm64.tar.gz

      - name: Create and Push Multi-Arch Manifest [PHP ${{ matrix.php_version }}-${{ matrix.variant }}]
        run: |
          docker manifest create esst/php:${{ matrix.php_version }}-${{ matrix.variant }} \
            --amend esst/php:${{ matrix.php_version }}-${{ matrix.variant }}-amd64 \
            --amend esst/php:${{ matrix.php_version }}-${{ matrix.variant }}-arm64

          docker manifest push esst/php:${{ matrix.php_version }}-${{ matrix.variant }}